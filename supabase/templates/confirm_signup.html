<div style="font-family:Arial,sans-serif;
  max-width:600px;margin:0 auto;
  background:#1A1A2E;padding:40px;
  border-radius:16px;">
  <div style="text-align:center;
    margin-bottom:30px;">
    <h1 style="color:#00D4AA;
      font-size:32px;margin:0;">
      Splivy
    </h1>
    <p style="color:#888;font-size:14px;
      margin:5px 0 0;">
      Split smart. Settle easy.
    </p>
  </div>
  <h2 style="color:#ffffff;font-size:24px;
    text-align:center;">
    Welcome! 👋 Verify your email
  </h2>
  <p style="color:#aaaaaa;font-size:16px;
    text-align:center;">
    Thanks for signing up to Splivy!
    Click below to verify your email
    and start splitting expenses.
  </p>
  <div style="text-align:center;
    margin:35px 0;">
    <a href="{{ .ConfirmationURL }}"
      style="background:#00D4AA;
      color:#000000;padding:16px 40px;
      border-radius:12px;
      text-decoration:none;
      font-weight:bold;font-size:16px;
      display:inline-block;">
      ✅ Verify Email Address
    </a>
  </div>
  <p style="color:#666;font-size:13px;
    text-align:center;">
    This link expires in 24 hours.
  </p>
  <hr style="border:1px solid #0F3460;
    margin:30px 0;">
  <p style="color:#555;font-size:12px;
    text-align:center;">
    If you didn't create a Splivy account,
    ignore this email.
  </p>
  <p style="color:#555;font-size:12px;
    text-align:center;">
    — The Splivy Team 🇵🇰
  </p>
</div>
